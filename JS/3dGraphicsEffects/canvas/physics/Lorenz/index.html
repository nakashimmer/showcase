<!DOCTYPE html>
<html>
	<head>
		<!-- Google Analytics -->
		<script src="/showcase/ga.js"></script>
		<meta charset="utf-8">
		<title>ローレンツアトラクタ</title>
		<meta name=viewport content="width=device-width">
		<link rel="stylesheet" href="../../../../../sample.css">
		<style>
			body {
				margin: 0;
				background: black;
				color: white;
				text-align: center;
			}

			#wrap {
				width: 800px;
			}

			canvas {
				display: block;
				margin: 0 auto;
				width: 800px;
				height: 600px;
			}
		</style>
	</head>
	<body>
		<h1>ローレンツ系</h1>
		<div id="wrap">
			<p> ρ = <span id="rhoValue">28</span>
				<input id="rho" type="range" min="1" max="100" value="28" step="0.1"></p>
			<p>
				<canvas id="canvas" width="1600" height="1200"></canvas></p>
			</div>
			<footer>
				<p><small>(C)<a href="https://www.facebook.com/NakashimaShunji/">なかしまぁ先生</a></small>
				</p>
			</footer>
			<script>
				const canvas = document.getElementById("canvas");
				const ctx = canvas.getContext("2d");

				function resize() {
					canvas.width = window.innerWidth;
					canvas.height = window.innerHeight;
				}
				resize();
				window.addEventListener("resize", resize);

				//////////////////////////////////////////////////
				// Lorenz Parameters
				//////////////////////////////////////////////////

				const sigma = 10;
				const beta = 8 / 3;
				let rho = 28;

				//////////////////////////////////////////////////
				// Camera
				//////////////////////////////////////////////////

				let rotX = 0.4;
				let rotY = 0.8;
				let scale = 12;

				//////////////////////////////////////////////////
				// Mouse
				//////////////////////////////////////////////////

				let dragging = false;
				let lastX = 0;
				let lastY = 0;

				canvas.addEventListener("mousedown", e => {
					dragging = true;
					lastX = e.clientX;
					lastY = e.clientY;
				});

				window.addEventListener("mouseup", () => {
					dragging = false;
				});

				window.addEventListener("mousemove", e => {

					if (!dragging) return;

					const dx = e.clientX - lastX;
					const dy = e.clientY - lastY;

					rotY += dx * 0.01;
					rotX += dy * 0.01;

					lastX = e.clientX;
					lastY = e.clientY;
				});

				canvas.addEventListener("wheel", e => {
					e.preventDefault();

					scale *= (e.deltaY > 0 ? 0.9 : 1.1);
				});

				//////////////////////////////////////////////////
				// Generate Lorenz trajectory
				//////////////////////////////////////////////////

				let points = [];

				function generateLorenz() {

					points = [];

					let x = 0.1;
					let y = 0;
					let z = 0;

					const dt = 0.01;

					for (let i = 0; i < 12000; i++) {

						const dx = sigma * (y - x);
						const dy = x * (rho - z) - y;
						const dz = x * y - beta * z;

						x += dx * dt;
						y += dy * dt;
						z += dz * dt;

						points.push({ x, y, z });
					}
				}

				generateLorenz();

				//////////////////////////////////////////////////
				// Rotation
				//////////////////////////////////////////////////

				function rotatePoint(p) {

					let x = p.x;
					let y = p.y;
					let z = p.z;

					// X rotation
					let cy = Math.cos(rotX);
					let sy = Math.sin(rotX);

					let y1 = y * cy - z * sy;
					let z1 = y * sy + z * cy;

					y = y1;
					z = z1;

					// Y rotation
					let cx = Math.cos(rotY);
					let sx = Math.sin(rotY);

					let x1 = x * cx + z * sx;
					let z2 = -x * sx + z * cx;

					x = x1;
					z = z2;

					return { x, y, z };
				}

				//////////////////////////////////////////////////
				// Projection
				//////////////////////////////////////////////////

				function project(p) {

					const d = 120;

					const factor = d / (d + p.z);

					return {
						x: p.x * factor,
						y: p.y * factor,
						z: p.z
					};
				}

				//////////////////////////////////////////////////
				// Draw
				//////////////////////////////////////////////////

				function draw() {

					ctx.fillStyle = "black";
					ctx.fillRect(0, 0, canvas.width, canvas.height);

					ctx.save();

					ctx.translate(
						canvas.width / 2,
						canvas.height / 2
					);

					ctx.beginPath();

					for (let i = 0; i < points.length; i++) {

						const r = rotatePoint(points[i]);
						const p = project(r);

						const sx = p.x * scale;
						const sy = -p.y * scale;

						if (i === 0) {
							ctx.moveTo(sx, sy);
						} else {
							ctx.lineTo(sx, sy);
						}
					}

					ctx.strokeStyle = "#00ff88";
					ctx.lineWidth = 1;
					ctx.stroke();

					ctx.restore();

					requestAnimationFrame(draw);
				}

				draw();

				//////////////////////////////////////////////////
				// Slider
				//////////////////////////////////////////////////

				const slider = document.getElementById("rho");
				const rhoText = document.getElementById("rhoValue");

				slider.addEventListener("input", () => {

					rho = parseFloat(slider.value);

					rhoText.textContent = rho;

					generateLorenz();
				});


			</script>
	</body>
</html>
