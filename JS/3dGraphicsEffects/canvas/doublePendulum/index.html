<!DOCTYPE html>
<html lang="ja">
	<head>
		<!-- Google Analytics -->
		<script src="/showcase/ga.js"></script>
		<meta charset="utf-8">
		<title>二重振り子</title>
		<link rel="stylesheet" href="../../../../sample.css">
		<style>
			body {
				font-family: sans-serif;
				text-align: center;
				background: #f4f4f4;
			}

			.controls {
				margin: 20px;
			}

			.container {
				display: flex;
				justify-content: center;
				gap: 30px;
			}

			canvas {
				background: white;
				border: 1px solid #999;
			}
		</style>
	</head>
	<body>
		<h1>二重振り子</h1>
		<div id="wrap">
			<div class="controls"> 初期値の差（度） <input id="delta" type="number" step="0.000001" value="0.0001" style="width:120px">
				<button onclick="resetSimulation()"> 開始 </button>
			</div>
			<p> 左：120°<br> 右：120° + 入力値 </p>
			<div class="container">
				<canvas id="left" width="500" height="600"></canvas>
				<canvas id="right" width="500" height="600"></canvas>
			</div>
		</div>
		<footer>
			<p><small>(C)<a href="https://www.facebook.com/NakashimaShunji/">なかしまぁ先生</a></small>
			</p>
		</footer>
		<script>
	
		const g = 9.81;

		// 高速化
		const dt = 0.04;

		// 1フレームで何回計算するか
		const SPEED = 8;

		class DoublePendulum {

			constructor(t1, t2) {

				this.m1 = 1;
				this.m2 = 1;

				this.l1 = 140;
				this.l2 = 140;

				this.theta1 = t1;
				this.theta2 = t2;

				this.omega1 = 0;
				this.omega2 = 0;

				this.trace = [];
			}

			update() {

				const m1 = this.m1;
				const m2 = this.m2;

				const l1 = this.l1;
				const l2 = this.l2;

				const t1 = this.theta1;
				const t2 = this.theta2;

				const w1 = this.omega1;
				const w2 = this.omega2;

				const a1 =
					(
						-g * (2 * m1 + m2) * Math.sin(t1)
						- m2 * g * Math.sin(t1 - 2 * t2)
						- 2 * Math.sin(t1 - t2) * m2 *
						(
							w2 * w2 * l2 +
							w1 * w1 * l1 * Math.cos(t1 - t2)
						)
					)
					/
					(
						l1 *
						(
							2 * m1 + m2 -
							m2 * Math.cos(2 * t1 - 2 * t2)
						)
					);

				const a2 =
					(
						2 * Math.sin(t1 - t2)
						*
						(
							w1 * w1 * l1 * (m1 + m2)
							+
							g * (m1 + m2) * Math.cos(t1)
							+
							w2 * w2 * l2 * m2 * Math.cos(t1 - t2)
						)
					)
					/
					(
						l2 *
						(
							2 * m1 + m2 -
							m2 * Math.cos(2 * t1 - 2 * t2)
						)
					);

				this.omega1 += a1 * dt;
				this.omega2 += a2 * dt;

				this.theta1 += this.omega1 * dt;
				this.theta2 += this.omega2 * dt;
			}

			draw(ctx) {

				const ox = 250;
				const oy = 150;

				const x1 =
					ox + this.l1 * Math.sin(this.theta1);

				const y1 =
					oy + this.l1 * Math.cos(this.theta1);

				const x2 =
					x1 + this.l2 * Math.sin(this.theta2);

				const y2 =
					y1 + this.l2 * Math.cos(this.theta2);

				this.trace.push({ x: x2, y: y2 });

				if (this.trace.length > 3000) {
					this.trace.shift();
				}

				// 軌跡
				ctx.beginPath();

				for (let i = 0; i < this.trace.length; i++) {

					const p = this.trace[i];

					if (i === 0) {
						ctx.moveTo(p.x, p.y);
					} else {
						ctx.lineTo(p.x, p.y);
					}
				}

				ctx.strokeStyle =
					"rgba(255,0,0,0.35)";
				ctx.lineWidth = 1;
				ctx.stroke();

				// 棒
				ctx.beginPath();
				ctx.moveTo(ox, oy);
				ctx.lineTo(x1, y1);
				ctx.lineTo(x2, y2);

				ctx.strokeStyle = "black";
				ctx.lineWidth = 2;
				ctx.stroke();

				ctx.beginPath();
				ctx.arc(x1, y1, 8, 0, Math.PI * 2);
				ctx.fillStyle = "blue";
				ctx.fill();

				ctx.beginPath();
				ctx.arc(x2, y2, 8, 0, Math.PI * 2);
				ctx.fillStyle = "red";
				ctx.fill();
			}
		}

		let p1;
		let p2;

		const ctxL =
			document.getElementById("left")
				.getContext("2d");

		const ctxR =
			document.getElementById("right")
				.getContext("2d");

		function resetSimulation() {

			const delta =
				parseFloat(
					document.getElementById("delta").value
				);

			const base =
				120 * Math.PI / 180;

			p1 =
				new DoublePendulum(
					base,
					base
				);

			p2 =
				new DoublePendulum(
					base + delta * Math.PI / 180,
					base
				);
		}

		function loop() {

			requestAnimationFrame(loop);

			if (!p1) return;

			for (let i = 0; i < SPEED; i++) {

				p1.update();
				p2.update();
			}

			ctxL.clearRect(0, 0, 500, 600);
			ctxR.clearRect(0, 0, 500, 600);

			p1.draw(ctxL);
			p2.draw(ctxR);
		}

		resetSimulation();
		loop();


		</script>
	</body>
</html>
